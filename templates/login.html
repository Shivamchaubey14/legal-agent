{% extends 'base.html' %}
{% block title %}Sign In — LexAI{% endblock %}

{% block extra_css %}
<style>
.auth-page {
  min-height: calc(100vh - 58px);
  display: flex; align-items: center; justify-content: center;
  padding: 40px 24px;
  position: relative;
}
.auth-page::before {
  content: '';
  position: absolute;
  width: 500px; height: 500px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  pointer-events: none;
}
.auth-card {
  position: relative; z-index: 1;
  width: 100%; max-width: 420px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius-xl);
  padding: 40px 36px;
  box-shadow: var(--shadow-lg);
}
.auth-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 30px;
}
.auth-logo-icon {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--gold), #8B6914);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #0A0B0F;
  box-shadow: 0 0 18px var(--gold-glow);
}
.auth-brand {
  font-family: 'Instrument Serif', serif;
  font-size: 20px; color: var(--txt);
}
.auth-brand span { color: var(--gold); }
.auth-title {
  font-size: 22px; font-weight: 600;
  color: var(--txt); margin-bottom: 6px;
  letter-spacing: -0.02em;
}
.auth-sub { font-size: 13px; color: var(--txt3); margin-bottom: 28px; }
.auth-form { display: flex; flex-direction: column; gap: 18px; }
.auth-submit {
  width: 100%; padding: 11px;
  font-size: 14px; font-weight: 700;
  border-radius: var(--radius-sm);
  cursor: pointer; border: none;
  background: var(--gold); color: #0A0B0F;
  font-family: 'Geist', sans-serif;
  box-shadow: 0 0 18px var(--gold-glow);
  transition: all 0.15s;
}
.auth-submit:hover { background: var(--gold-light); transform: translateY(-1px); }
.auth-divider {
  text-align: center; font-size: 12px; color: var(--txt4);
  position: relative; margin: 4px 0;
}
.auth-divider::before, .auth-divider::after {
  content: ''; position: absolute;
  top: 50%; width: 40%; height: 1px;
  background: var(--border2);
}
.auth-divider::before { left: 0; }
.auth-divider::after { right: 0; }
.auth-switch {
  text-align: center; font-size: 12.5px; color: var(--txt4);
}
.auth-switch a { color: var(--gold); text-decoration: none; font-weight: 600; }
.auth-switch a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="ti ti-scale"></i></div>
      <span class="auth-brand">Lex<span>AI</span></span>
    </div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to your account to continue.</div>

    <form class="auth-form" method="POST" action="/auth/login/">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Username</label>
        <input class="form-input" type="text" name="username" placeholder="your_username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="auth-submit">
        <i class="ti ti-login" style="margin-right:6px;"></i> Sign In
      </button>
    </form>

    <div class="auth-divider" style="margin-top:20px;">or</div>
    <div class="auth-switch" style="margin-top:14px;">
      Don't have an account? <a href="/auth/register/">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}
